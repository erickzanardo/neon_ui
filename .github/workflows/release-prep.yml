name: Release Prep

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get latest tag
        id: get_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "raw_tag=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${{ steps.get_tag.outputs.tag }}..HEAD)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Bump version
        id: version
        run: |
          # Extract current version from pubspec.yaml
          CURRENT_VERSION=${{ steps.get_tag.outputs.raw_tag }}
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]:-0}
          MINOR=${VERSION_PARTS[1]:-0}
          PATCH=${VERSION_PARTS[2]:-0}

          # Bump version based on input
          BUMP_TYPE=${{ github.event.inputs.bump_type }}
          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update pubspec.yaml
        run: |
          # Update version in pubspec.yaml
          sed -i 's/^version: .*/version: ${{ steps.version.outputs.new_version }}/' pubspec.yaml

      - name: Create branch and commit
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git checkout -b release/v${{ steps.version.outputs.new_version }}
          git add pubspec.yaml
          git commit -m "chore: release v${{ steps.version.outputs.new_version }}"

      - name: Push branch
        run: |
          git push origin release/v${{ steps.version.outputs.new_version }}

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const changelog = `${{ steps.changelog.outputs.changelog }}`;
            const version = `${{ steps.version.outputs.new_version }}`;
            const body = [
              `## Release v${version}`,
              ``,
              `This PR was created by the Release Prep workflow.`,
              ``,
              `### Changelog`,
              `${changelog || 'No changes since last release'}`,
              ``,
              `### Changes`,
              `- Version bumped to v${version}`
            ].join('\n');
            github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Release v${version}`,
              body: body,
              head: `release/v${version}`,
              base: 'main'
            })
